name: "Setup Python and uv Environment"
description: "Consolidates Python setup, uv installation, and dependency syncing."

runs:
  using: "composite"
  steps:
    # Initialize the Python environment
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    # Install uv
    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        version: "latest"
    # Install dependencies from uv.lock
    - name: Install Locked Dependencies
      shell: bash
      run: uv sync --frozen